name: SPS Publish

on:
  push:
    branches:
      - publish

  workflow_dispatch:

  repository_dispatch:
    types:
      - sps_digital_garden_updated

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    env:
      THEME: "linky-tree"
      SPS_DG_PATH: "./sps-digital-garden"

    steps:
      - name: Prepare Dynamic Environment Variables
        run: |
          echo "BUILD_PATH=./astro-theme-${{ env.THEME }}" >> $GITHUB_ENV

      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: ${{ env.BUILD_PATH }}
          ref: 'publish'

      - name: Checkout sps-digital-garden
        uses: actions/checkout@v4
        with:
          repository: SPSZerone/sps-digital-garden
          ref: main
          path: ${{ env.SPS_DG_PATH }}
          token: ${{ secrets.SPS_DG_PUBLISH_PAT }}

      - name: Setup Nushell
        uses: hustcer/setup-nu@v3
        with:
          nu-version: '0.112.2'

      - name: "SPS Digital Garden -> scripts/publish.nu"
        run: nu ${{ env.SPS_DG_PATH }}/scripts/publish.nu -s astro -t ${{ env.THEME }} -p ${{ env.BUILD_PATH }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: ${{ env.BUILD_PATH }}/pnpm-lock.yaml

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ${{ env.BUILD_PATH }}

      - name: Build with Astro
        run: |
          pnpm run build \
            --site "${{ steps.pages.outputs.origin }}" \
            --base "${{ steps.pages.outputs.base_path }}"
        working-directory: ${{ env.BUILD_PATH }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.BUILD_PATH }}/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify-downstream:
    name: Notify spszerone.github.io
    # if: |
    #   (github.event_name == 'push' && github.ref == 'refs/heads/publish') ||
    #   (github.event_name == 'repository_dispatch' && github.event.action == 'sps_digital_garden_updated')
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/publish')
    runs-on: ubuntu-latest
    steps:
      - name: Send repository_dispatch event
        run: |
          # 1. 执行 curl 请求
          # -s: 静默模式（不显示下载进度条）
          # -w "%{http_code}": 请求完成后，仅把 HTTP 状态码单独拿出来
          # -o response.txt: 将真实的 API 返回内容（如报错 JSON）存入文件
          HTTP_STATUS=$(curl -L -s -w "%{http_code}" -o response.txt \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.SPS_DG_DOWNSTREAM_PUBLISH_PAT }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/SPSZerone/spszerone.github.io/dispatches \
            -d '{
              "event_type": "astro_theme_linky_tree_updated",
              "client_payload": {
                "source_commit": "${{ github.sha }}",
                "message": "Content updated in astro-theme-linky-tree"
              }
            }')
          
          # 2. 判断状态码
          # 预期成功的状态码是 204 (No Content)
          if [ "$HTTP_STATUS" -eq 204 ]; then
            echo "✅ 成功触发下游构建 (HTTP $HTTP_STATUS)"
          else
            echo "❌ 触发失败！HTTP 状态码: $HTTP_STATUS"
            echo "=== GitHub API 返回的错误信息 ==="
            cat response.txt
            # exit 1 强制中断当前流水线，将其标记为失败 (红叉)
            exit 1 
          fi
